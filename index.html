<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificamex — Validador de Identidad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0e0e;
      --surface:  #161616;
      --surface2: #1c1c1c;
      --surface3: #242424;
      --border:   #272727;
      --border2:  #333;
      --green:    #4caf6e;
      --gbg:      #111e15;
      --gtxt:     #6fd98f;
      --gbr:      #1e3d27;
      --muted:    #555;
      --muted2:   #888;
      --text:     #e0e0e0;
      --text2:    #999;
      --rbg:      #1e0e0e;
      --rbr:      #3a1818;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', system-ui, sans-serif;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--sans); font-size: 14px; line-height: 1.5; overflow: hidden;
    }

    .app { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: 210px; min-width: 210px;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .brand { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
    .brand-row { display: flex; align-items: center; gap: 9px; }
    .brand-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--gbg); border: 1px solid var(--gbr);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .brand-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .brand-sub  { font-size: 11px; color: var(--muted2); margin-top: 5px; padding-left: 37px; }

    .nav { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: 6px;
      font-size: 13px; color: var(--text2);
      border: none; background: none; width: 100%; text-align: left;
      cursor: pointer; font-family: var(--sans);
      transition: background .12s, color .12s;
    }
    .nav-item:hover  { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--surface3); color: var(--text); }
    .ndot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; transition: background .12s;
    }
    .nav-item.active .ndot { background: var(--green); }

    .sfooter { padding: 12px; }
    .mbadge {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 11px; border-radius: 20px;
      background: #0e1a10; border: 1px solid #1e3d27;
      font-size: 11px; color: var(--gtxt); font-family: var(--mono);
    }
    .mdot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }

    /* ── Main ── */
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .topbar { padding: 22px 28px 18px; border-bottom: 1px solid var(--border); }
    .topbar h1 { font-size: 16px; font-weight: 500; }
    .topbar p  { font-size: 12px; color: var(--muted2); margin-top: 3px; }
    .content { padding: 22px 28px; display: flex; flex-direction: column; gap: 18px; }

    .slabel {
      font-size: 10px; font-weight: 500; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }

    /* ── Upload zones ── */
    .ugrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .uzone {
      border: 1.5px dashed var(--border2); border-radius: 10px;
      padding: 24px 16px; cursor: pointer; position: relative;
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      background: var(--surface2); transition: border-color .2s, background .2s;
    }
    .uzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .uzone:hover { border-color: #3a3a3a; background: #1e1e1e; }
    .uzone.done  { border-color: var(--green); border-style: solid; background: var(--gbg); }

    .uico  { transition: opacity .15s; }
    .uchk  { display: none; }
    .uzone.done .uico { display: none; }
    .uzone.done .uchk { display: block; }

    .utitle { font-size: 13px; font-weight: 500; color: var(--text2); text-align: center; }
    .usub   { font-size: 11px; color: var(--muted); text-align: center; }
    .uzone.done .utitle { color: var(--gtxt); }
    .uzone.done .usub   { color: #3d6648; }

    .thumb {
      width: 52px; height: 34px; border-radius: 4px;
      object-fit: cover; border: 1px solid var(--gbr); display: none;
    }
    .uzone.done .thumb { display: block; }

    /* ── Buttons ── */
    .btn-main {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 11px; border-radius: 8px;
      border: 1px solid var(--border2); background: var(--surface2); color: var(--text2);
      font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all .15s;
    }
    .btn-main:hover:not(:disabled) { border-color: #3f3f3f; background: var(--surface3); color: var(--text); }
    .btn-main:disabled { opacity: .35; cursor: not-allowed; }
    .spinner {
      width: 13px; height: 13px; border: 1.5px solid var(--border2);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin .7s linear infinite; display: none;
    }
    .btn-main.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result card ── */
    .rcard { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; animation: up .25s ease; }
    @keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    .rhead {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
    }
    .rhead-title { font-size: 12px; color: var(--text2); font-weight: 500; }

    .badge-ok  { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--gbg); color: var(--gtxt); border: 1px solid var(--gbr); font-family: var(--mono); }
    .badge-bad { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--rbg); color: #e08888;      border: 1px solid var(--rbr); font-family: var(--mono); }

    .rbody { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .rf label { font-size: 10px; color: var(--muted2); display: block; margin-bottom: 3px; letter-spacing: .03em; }
    .rf span  { font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--mono); }
    .rf.full  { grid-column: 1/-1; }

    /* ── Error card ── */
    .errcard {
      border: 1px solid var(--rbr); border-radius: 10px; overflow: hidden;
      background: var(--rbg); animation: up .25s ease;
    }
    .errcard-body { padding: 14px 16px; }
    .errcard-title { font-size: 12px; color: #e08888; font-weight: 500; margin-bottom: 4px; }
    .errcard-msg   { font-size: 12px; color: #a06060; font-family: var(--mono); }

    /* ── CURP ── */
    .crow { display: flex; gap: 10px; }
    .cinput {
      flex: 1; padding: 10px 14px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); font-family: var(--mono); font-size: 13px;
      letter-spacing: .06em; outline: none; transition: border-color .15s;
      text-transform: uppercase;
    }
    .cinput::placeholder { font-family: var(--sans); letter-spacing: 0; color: var(--muted); font-size: 13px; }
    .cinput:focus { border-color: #3f3f3f; }
    .btn-sm {
      padding: 10px 18px; border-radius: 8px;
      border: 1px solid var(--border2); background: var(--surface2); color: var(--text2);
      font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer;
      white-space: nowrap; transition: all .15s;
    }
    .btn-sm:hover:not(:disabled) { background: var(--surface3); border-color: #3f3f3f; color: var(--text); }
    .btn-sm:disabled { opacity: .35; cursor: not-allowed; }

    .ccard { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; animation: up .25s ease; }
    .chead { padding: 13px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .cval  { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--text); letter-spacing: .07em; }
    .cbody { padding: 16px; display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
  </style>
</head>
<body>
<div class="app">

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-row">
        <div class="brand-icon">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#4caf6e" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <span class="brand-name">Verificamex</span>
      </div>
      <div class="brand-sub">Validador de identidad</div>
    </div>

    <nav class="nav">
      <button class="nav-item active" id="nav-ine" onclick="go('ine')">
        <span class="ndot"></span> Validar INE
      </button>
      <button class="nav-item" id="nav-curp" onclick="go('curp')">
        <span class="ndot"></span> Validar CURP
      </button>
    </nav>

    <div class="sfooter">
      <div class="mbadge"><span class="mdot"></span> API real activa</div>
    </div>
  </aside>

  <!-- ─── Main ─── -->
  <main class="main">

    <!-- INE -->
    <div id="sec-ine">
      <div class="topbar">
        <h1>Validar INE</h1>
        <p>Carga las imágenes de la credencial de elector</p>
      </div>
      <div class="content">

        <div>
          <div class="slabel">Imágenes de la INE</div>
          <div class="ugrid">

            <div class="uzone" id="zf">
              <input type="file" accept="image/*,.pdf" onchange="pick('front',this)" />
              <svg class="uico" width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#555" stroke-width="1.6">
                <rect x="3" y="4" width="18" height="14" rx="2"/>
                <circle cx="9" cy="11" r="2.5"/><line x1="14" y1="9" x2="19" y2="9"/><line x1="14" y1="12" x2="18" y2="12"/>
              </svg>
              <svg class="uchk" width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#4caf6e" stroke-width="1.8">
                <circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/>
              </svg>
              <img class="thumb" id="tf" src="" alt="" />
              <span class="utitle" id="ft">Frente</span>
              <span class="usub"  id="fs">Clic para cargar imagen</span>
            </div>

            <div class="uzone" id="zb">
              <input type="file" accept="image/*,.pdf" onchange="pick('back',this)" />
              <svg class="uico" width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#555" stroke-width="1.6">
                <rect x="3" y="4" width="18" height="14" rx="2"/>
                <line x1="7" y1="9" x2="12" y2="9"/><line x1="7" y1="12" x2="14" y2="12"/><line x1="7" y1="15" x2="11" y2="15"/>
              </svg>
              <svg class="uchk" width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#4caf6e" stroke-width="1.8">
                <circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/>
              </svg>
              <img class="thumb" id="tb" src="" alt="" />
              <span class="utitle" id="bt">Reverso</span>
              <span class="usub"  id="bs">Clic para cargar imagen</span>
            </div>

          </div>
        </div>

        <button class="btn-main" id="bine" onclick="doINE()" disabled>
          <div class="spinner" id="spin"></div>
          <svg id="iico" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-.18-5.65"/>
          </svg>
          <span id="ilbl">Validar INE</span>
        </button>

        <div id="ir"></div>
      </div>
    </div>

    <!-- CURP -->
    <div id="sec-curp" style="display:none">
      <div class="topbar">
        <h1>Validar CURP</h1>
        <p>Ingresa la CURP para verificarla ante RENAPO</p>
      </div>
      <div class="content">

        <div>
          <div class="slabel">Clave Única de Registro de Población</div>
          <div class="crow">
            <input class="cinput" id="ci" maxlength="18"
              placeholder="Ej: RELA040521HMNNPRA5"
              oninput="this.value=this.value.toUpperCase()"
              onkeydown="if(event.key==='Enter')doCURP()" />
            <button class="btn-sm" id="bcurp" onclick="doCURP()">Validar</button>
          </div>
        </div>

        <div id="cr"></div>
      </div>
    </div>

  </main>
</div>

<script>
const API = ""; // mismo origen — si el HTML está servido por Flask

/* ── Navigation ─────────────────────────────── */
function go(s) {
  ['ine','curp'].forEach(x => {
    document.getElementById('sec-'+x).style.display  = x===s?'':'none';
    document.getElementById('nav-'+x).classList.toggle('active', x===s);
  });
}

/* ── File picker ─────────────────────────────── */
const fileObjs = {};   // guarda los File objects reales

function pick(side, input) {
  const f = input.files[0]; if (!f) return;
  fileObjs[side] = f;

  const zid = side==='front'?'zf':'zb';
  document.getElementById(zid).classList.add('done');
  const short = f.name.length>22 ? f.name.slice(0,20)+'…' : f.name;
  document.getElementById(side==='front'?'ft':'bt').textContent = side==='front'?'Frente cargado':'Reverso cargado';
  document.getElementById(side==='front'?'fs':'bs').textContent = short;

  if (!f.type.includes('pdf')) {
    const tid = side==='front'?'tf':'tb';
    const rd = new FileReader();
    rd.onload = e => { document.getElementById(tid).src = e.target.result; };
    rd.readAsDataURL(f);
  }

  // Habilitar botón si al menos el frente está cargado
  if (fileObjs.front) document.getElementById('bine').disabled = false;
}

/* ── Helpers de UI ───────────────────────────── */
function setLoading(on) {
  const btn = document.getElementById('bine');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
  document.getElementById('spin').style.display = on ? 'block' : 'none';
  document.getElementById('iico').style.display = on ? 'none'  : '';
  document.getElementById('ilbl').textContent   = on ? 'Procesando…' : 'Validar INE';
}

function showError(container, msg) {
  document.getElementById(container).innerHTML = `
    <div class="errcard">
      <div class="errcard-body">
        <div class="errcard-title">Error</div>
        <div class="errcard-msg">${msg}</div>
      </div>
    </div>`;
}

/* ── INE ─────────────────────────────────────── */
async function doINE() {
  if (!fileObjs.front) return;

  setLoading(true);
  document.getElementById('ir').innerHTML = '';

  const fd = new FormData();
  fd.append('frente',  fileObjs.front);
  fd.append('reverso', fileObjs.back || fileObjs.front); // si falta reverso manda el frente

  try {
    const res  = await fetch(API + '/api/validar-ine', { method: 'POST', body: fd });
    const json = await res.json();

    if (json.error) {
      showError('ir', json.mensaje || json.detalle || 'Error desconocido.');
      return;
    }

    const interp = json.interpretacion || {};
    const datos  = interp.datos_extraidos || {};
    const nominal = interp.lista_nominal;
    const badge   = nominal
      ? `<span class="badge-ok">✓ Lista nominal vigente</span>`
      : `<span class="badge-bad">✗ No encontrado en lista nominal</span>`;

    // Campos que queremos mostrar (con etiquetas amigables)
    const MAP = {
      fullName:        'Nombre completo',
      curp:            'CURP',
      birthDate:       'Fecha de nacimiento',
      expirationDate:  'Fecha de expiración',
      electorKey:      'Clave de elector',
      gender:          'Sexo',
      address:         'Dirección',
    };

    const fields = Object.entries(MAP)
      .filter(([k]) => datos[k])
      .map(([k, label]) => {
        const full = ['address','fullName'].includes(k) ? ' full' : '';
        return `<div class="rf${full}"><label>${label}</label><span>${datos[k]}</span></div>`;
      }).join('');

    // Si la API devuelve campos distintos, mostrar todos los que vengan
    const extraFields = Object.entries(datos)
      .filter(([k]) => !MAP[k] && datos[k])
      .map(([k, v]) => `<div class="rf"><label>${k}</label><span>${v}</span></div>`)
      .join('');

    document.getElementById('ir').innerHTML = `
      <div class="rcard">
        <div class="rhead">
          <span class="rhead-title">Datos extraídos por OCR — ${interp.mensaje || ''}</span>
          ${badge}
        </div>
        <div class="rbody">${fields || extraFields || '<div class="rf full"><label>Respuesta</label><span>Sin datos estructurados</span></div>'}</div>
      </div>`;

  } catch (err) {
    showError('ir', 'No se pudo conectar con el servidor Python. ¿Está corriendo server.py?');
    console.error(err);
  } finally {
    setLoading(false);
  }
}

/* ── CURP ────────────────────────────────────── */
async function doCURP() {
  const val = document.getElementById('ci').value.trim().toUpperCase();
  document.getElementById('cr').innerHTML = '';
  if (!val) return;

  const btn = document.getElementById('bcurp');
  btn.disabled = true;
  btn.textContent = 'Validando…';

  try {
    const res  = await fetch(API + '/api/validar-curp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ curp: val })
    });
    const json = await res.json();

    if (json.error) {
      showError('cr', json.mensaje || 'Error desconocido.');
      return;
    }

    const interp = json.interpretacion || {};
    const ok     = interp.valida;
    const badge  = ok
      ? `<span class="badge-ok">✓ CURP válida en RENAPO</span>`
      : `<span class="badge-bad">✗ No encontrada en RENAPO</span>`;

    let body = '';
    if (interp.nombre || interp.sexo || interp.fecha_nacimiento) {
      body = `<div class="cbody">
        ${interp.nombre           ? `<div class="rf"><label>Nombre</label><span>${interp.nombre}</span></div>` : ''}
        ${interp.sexo             ? `<div class="rf"><label>Sexo</label><span>${interp.sexo}</span></div>` : ''}
        ${interp.fecha_nacimiento ? `<div class="rf"><label>Fecha de nacimiento</label><span>${interp.fecha_nacimiento}</span></div>` : ''}
        ${interp.entidad          ? `<div class="rf"><label>Entidad</label><span>${interp.entidad}</span></div>` : ''}
        ${interp.status_curp      ? `<div class="rf"><label>Status CURP</label><span>${interp.status_curp}</span></div>` : ''}
        ${interp.mensaje          ? `<div class="rf"><label>Mensaje</label><span>${interp.mensaje}</span></div>` : ''}
      </div>`;
    } else {
      body = `<div style="padding:13px 16px;font-size:12px;color:#666">${interp.mensaje || 'Sin información adicional.'}</div>`;
    }

    document.getElementById('cr').innerHTML = `
      <div class="ccard">
        <div class="chead"><span class="cval">${val}</span>${badge}</div>
        ${body}
      </div>`;

  } catch (err) {
    showError('cr', 'No se pudo conectar con el servidor Python. ¿Está corriendo server.py?');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Validar';
  }
}
</script>
</body>
</html>
